# ──────────────────────────────────────────────────────────────────────────────
# setup.yml — 首次建档（两阶段，自动连续执行）
#
# 仓库名即 Twitter 用户名，无需任何配置。
#
# 第一阶段：fetch-cdx → fetch-html → build-index → push → 开启Pages
#   跑完后 Pages 立刻上线（纯文字版）
#
# 第二阶段：fetch-media → build-index → push
#   媒体下载完成后自动更新
#
# 触发：Actions → 首次建档 → Run workflow
# ──────────────────────────────────────────────────────────────────────────────

name: 首次建档

on:
  workflow_dispatch:
    inputs:
      since:
        description: "抓取起始时间戳（可选，格式 YYYYMMDDhhmmss，留空抓全部）"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 读取用户名
        id: info
        run: |
          U="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          PAGES_URL="https://${OWNER}.github.io/${U}/"
          echo "username=$U"          >> $GITHUB_OUTPUT
          echo "pages_url=$PAGES_URL" >> $GITHUB_OUTPUT
          echo "📋 目标账号: $U"
          echo "🔗 Pages 地址: $PAGES_URL"

      - name: 安装依赖
        run: pip install requests beautifulsoup4 --quiet

      # ⚠️  archive.py 直链硬编码在这里，仓库名变更时修改此处 URL
      - name: 拉取 archive.py
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/sjshb57/Test/main/archive.py" \
            -o archive.py
          echo "✅ archive.py ($(wc -l < archive.py) 行)"

      - name: 拉取 index.html 和 .nojekyll
        run: |
          U="${{ steps.info.outputs.username }}"
          curl -fsSL \
            "https://raw.githubusercontent.com/sjshb57/AnIncanescence/main/index.html" \
            -o index.html
          curl -fsSL \
            "https://raw.githubusercontent.com/sjshb57/AnIncanescence/main/.nojekyll" \
            -o .nojekyll
          sed -i "s/const ACCOUNTS_HARDCODED = \['AnIncandescence', 'TauCeti_10700'\]/const ACCOUNTS_HARDCODED = ['$U']/" index.html
          echo "✅ index.html + .nojekyll（已替换用户名）"

      - name: 建目录结构
        run: |
          U="${{ steps.info.outputs.username }}"
          mkdir -p accounts/$U/wayback_snapshots/{html,json,image,video,avatar,_log}
          echo "✅ accounts/$U/ 目录已建立"

      - name: 生成占位 profile.json
        run: |
          U="${{ steps.info.outputs.username }}"
          cat > accounts/$U/wayback_snapshots/profile.json << EOF
          {
            "name": "",
            "username": "@$U",
            "bio": "",
            "location": "",
            "link": "",
            "avatar": "avatar/avatar.jpg",
            "banner": "avatar/1500x500.jpg"
          }
          EOF
          echo "✅ profile.json 已生成（请事后手动补全）"

      - name: fetch-cdx
        run: |
          U="${{ steps.info.outputs.username }}"
          SINCE="${{ github.event.inputs.since }}"
          cd accounts/$U
          if [ -n "$SINCE" ]; then
            python3 ../../archive.py fetch-cdx "$U" --from "$SINCE"
          else
            python3 ../../archive.py fetch-cdx "$U"
          fi

      - name: fetch-html
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 ../../archive.py fetch-html || true

      - name: build-index（第一阶段）
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 ../../archive.py build-index

      # ── 第一次 push：Pages 先上线（纯文字版）──────────────────────────────
      - name: 推送第一阶段产物
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "无新内容" && exit 0
          COUNT=$(git diff --cached --numstat | wc -l)
          git commit -m "🗂️ 首次建档 HTML: ${{ steps.info.outputs.username }} (+${COUNT} 文件) [skip ci]"
          git push
          echo "✅ 第一阶段推送完成"

      - name: 开启 GitHub Pages
        run: |
          RESP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"main","path":"/"}}')
          if [ "$RESP" = "201" ]; then
            echo "✅ Pages 已开启"
          elif [ "$RESP" = "409" ]; then
            echo "ℹ️  Pages 已存在，跳过"
          else
            echo "⚠️  Pages 开启返回: $RESP"
          fi

      - name: 设置仓库 Homepage 链接
        run: |
          RESP=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }} \
            -d "{\"homepage\": \"${{ steps.info.outputs.pages_url }}\"}")
          if [ "$RESP" = "200" ]; then
            echo "✅ Homepage: ${{ steps.info.outputs.pages_url }}"
          else
            echo "⚠️  Homepage 设置返回: $RESP"
          fi

      # ── 第二阶段：下载媒体 ─────────────────────────────────────────────────
      - name: fetch-media
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 ../../archive.py fetch-media || true


      - name: build-index（第二阶段）
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 ../../archive.py build-index

      # ── 第二次 push：媒体版上线 ────────────────────────────────────────────
      - name: 推送第二阶段产物
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "✅ 无新媒体文件"
            exit 0
          fi
          COUNT=$(git diff --cached --numstat | wc -l)
          git commit -m "🖼️ 首次建档 媒体: ${{ steps.info.outputs.username }} (+${COUNT} 文件) [skip ci]"
          git push
          echo "✅ 第二阶段推送完成"
          echo "🔗 ${{ steps.info.outputs.pages_url }}"
