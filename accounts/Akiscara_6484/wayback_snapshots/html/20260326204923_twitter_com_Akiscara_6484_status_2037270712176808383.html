  突然想起以前我爸爸老带我去捡垃圾换钱。在路上一边挨打一边捡垃圾翻垃圾桶找塑料瓶纸壳子之类的东西。又委屈又生气。我当时上学需要用钢笔，我的好像用不了了，走了10公里，一共卖出去10块钱，和弟弟一人一半，花了三块买钢笔，两买了两个馒头。卖的时候爸爸让我和一个小姐姐说多两块钱。正好十块。
